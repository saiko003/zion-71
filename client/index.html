<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ZION 71</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOBBY -->
<div id="lobby-controls">
    <h1>ZION 71</h1>
    <button id="btn-start">NIS LOJËN (START)</button>
    <p id="lobby-text">Prit lojtarët e tjerë të futen...</p>
</div>

<!-- GAME TABLE -->
<div id="game-table" style="display: none;">
    
    <!-- Header me Points dhe Round -->
    <div class="game-header">
        <div class="points-box" id="display-piket-header">Pikët: <span id="piket-vlera-header">0</span></div>
        <div class="round-box" id="round-display">Raundi: <span id="current-round">1</span>/<span id="max-rounds">10</span></div>
    </div>

    <!-- LAYOUT 3 KOLONA -->
    <div class="landscape-container">
        
        <!-- KOLONA 1 - LOJTARËT -->
        <div class="players-column" id="players-column"></div>

        <!-- KOLONA 2 - QENDRA -->
        <div class="center-column">
            <div class="table-area">
                <div class="deck-wrapper">
                    <div id="deck-zion" class="card-stack">ZION</div>
                </div>
                <div id="jackpot" class="card-stack jackpot-card" style="display: none;">JACKPOT</div>
                <div id="discard-pile" class="drop-zone">
                    <span class="label">HEDH</span>
                    <div id="discard-cards-container" class="discard-cards"></div>
                </div>
            </div>

            <!-- Tabela e rezultatit - E VOGËL, KLIKOHET -->
            <div class="results-table" id="results-table-clickable">
                <h3>TABELA E REZULTATIT</h3>
                <table id="landscape-score-table">
                    <thead>
                        <tr>
                            <th>Lojtari</th>
                            <th>Pikët</th>
                        </tr>
                    </thead>
                    <tbody id="landscape-score-body"></tbody>
                </table>
            </div>
        </div>

        <!-- KOLONA 3 - CHAT -->
        <div class="chat-column">
            <div class="chat-header">CHAT</div>
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chat-input" placeholder="Shkruaj...">
                <button class="chat-send" id="chat-send">Dërgo</button>
            </div>
        </div>
    </div>

    <!-- Asistenti dhe butoni -->
    <div class="action-area">
        <div id="asistenti-container">
            <div id="status-drita" class="led-red"></div>
            <span id="status-teksti">Duke pritur...</span>
        </div>
        <button id="btn-mbyll" style="display: none;">MBYLL LOJËN</button>
    </div>

    <!-- Dora e lojtarit -->
    <div class="hand-section">
        <div id="player-hand" class="hand-area"></div>
    </div>

    <!-- MODAL I MADH PËR TABELËN -->
    <div id="score-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📊 Historiku i Pikëve</h2>
                <span class="close-button" onclick="toggleScoreboard()">&times;</span>
            </div>
            <div id="modal-score-table-container"></div>
            <button onclick="toggleScoreboard()">Mbyll</button>
        </div>
    </div>

    <!-- Modalët e tjerë -->
    <div id="round-modal" class="modal-overlay" style="display: none;">...</div>
    <div id="winner-cards-display" class="winner-cards-overlay" style="display: none;">...</div>
</div>

<!-- Mesazhi për rotullim -->
<div class="rotate-message">
    <div class="icon">📱</div>
    <h2>Rrotullo telefonin!</h2>
    <p>Kjo lojë luhet vetëm në pozicion horizontal</p>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="script.js"></script>
</body>
</html>
