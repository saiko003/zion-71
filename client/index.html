<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZION 71 - Multiplayer</title>
    <link rel="stylesheet" href="style.css">
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline' wss://zion-71.onrender.com; img-src * data: blob: 'unsafe-inline'; frame-src *; style-src * 'unsafe-inline';">
</head>
<body>

    <div id="lobby-controls">
        <h1>ZION 71</h1>
        <div class="input-group">
            <button id="btn-start">NIS LOJËN (START)</button>
        </div>
        <p id="lobby-text">Prit lojtarët e tjerë të futen...</p>
    </div>
    
    <div id="game-table" style="display: none;">
        
        <div id="scoreboard-container">
            <table id="side-score-table"> 
                <thead>
                    <tr>
                        <th>Lojtari</th>
                        <th>Historia</th> 
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="side-score-body"></tbody>
            </table>
        </div>

        <div class="center-area">
            <div class="deck-wrapper" style="position: relative;">
                <div id="deck-zion" class="card-stack">ZION</div>
                <div id="victory-drop-zone" class="victory-zone" style="display: none;">
                    <span>MBYLL<br>ZION</span>
                </div>
            </div>

            <div id="jackpot" class="card" style="display: none;"></div>

            <div id="discard-pile" class="drop-zone">
                <span class="label">HEDH KËTU</span>
            </div>
        </div>

        <div id="asistenti-container">
            <div id="status-drita" class="led-red"></div>
            <div id="asistenti-info">
                <span id="status-teksti">Duke pritur...</span>
            </div>
            <button id="btn-mbyll" class="zion-button" style="display: none;">MBYLL LOJËN (ZION)</button>
        </div>

        <div id="player-hand" class="hand-area"></div>
    </div>

    <div id="round-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2>📊 Rezultatet e Raundit</h2>
            <table id="modal-score-table">
                <thead>
                    <tr>
                        <th>Lojtari</th>
                        <th>Raundi</th>
                        <th>Totali</th>
                        <th>Statusi</th>
                    </tr>
                </thead>
                <tbody id="score-body"></tbody> </table>
            <div class="modal-footer">
                <p id="next-round-timer">Raundi i ri nis pas pak...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
