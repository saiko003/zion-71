<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZION 71 · Mobile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header me informacion -->
    <div class="game-header">
        <div class="round-info">
            <span>Raundi <span id="current-round">1</span>/<span id="max-rounds">10</span></span>
        </div>
        <div class="score-toggle" onclick="toggleScoreboard()">
            <span>🏆</span>
        </div>
        <div class="player-status">
            <span class="led" id="status-drita"></span>
            <span id="status-teksti">Pret radhën...</span>
        </div>
    </div>

    <!-- Pjesa qendrore: Stiva dhe Jackpot -->
    <div class="center-area">
        <!-- Stiva (Deck) -->
        <div class="deck-container" id="deck-zion">
            <div class="deck-card"></div>
            <div class="deck-card"></div>
            <div class="deck-card"></div>
            <div class="deck-card"></div>
            <span class="deck-label">STIVA</span>
        </div>

        <!-- Jackpot -->
        <div class="jackpot-container" id="jackpot">
            <div class="jackpot-card">
                <span class="v">?</span>
                <span class="s">★</span>
            </div>
            <span class="jackpot-label">JACKPOT</span>
        </div>
    </div>

    <!-- Dora e lojtarit -->
    <div class="hand-area">
        <div class="hand-header">
            <span>Letrat e mia (<span id="card-count">0</span>)</span>
            <span id="display-piket-header">Pikët: 0</span>
        </div>
        <div class="hand-container" id="player-hand"></div>
    </div>

    <!-- Zona e hedhjes (Discard) -->
    <div class="discard-area">
        <div class="discard-header">Letrat e hedhura</div>
        <div class="discard-pile" id="discard-pile">
            <div class="discard-cards-container" id="discard-cards-container"></div>
        </div>
    </div>

    <!-- Butoni i mbylljes -->
    <div class="close-button-container">
        <button class="zion-button" id="btn-mbyll" style="display: none;">MBYLL (ZION)</button>
    </div>

    <!-- Scoreboard Modal -->
    <div class="modal" id="score-modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Tabela e Rezultateve</h3>
                <span class="close-modal" onclick="toggleScoreboard()">×</span>
            </div>
            <div class="modal-body" id="modal-score-table-container"></div>
        </div>
    </div>

    <!-- Winner Cards Modal -->
    <div class="modal" id="winner-cards-display" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🏆 Letrat Fituese 🏆</h3>
            </div>
            <div class="modal-body" id="winner-cards-container"></div>
        </div>
    </div>

    <!-- Chat (minimal) -->
    <div class="chat-container">
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Chat..." maxlength="50">
            <button id="chat-send">→</button>
        </div>
    </div>

    <!-- Hidden elements -->
    <div id="side-score-table" style="display: none;"></div>

    <!-- Socket.io dhe script-et -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
