<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZION 71</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            background: radial-gradient(circle, #1a4a1a 0%, #0d2a0d 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* PORTRAIT MESSAGE */
        .rotate-message {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1a4a1a 0%, #0d2a0d 100%);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 999999;
        }

        @media screen and (orientation: portrait) {
            #game-table { display: none !important; }
            .rotate-message { display: flex !important; }
        }

        .rotate-message .icon { font-size: 80px; margin-bottom: 20px; }
        .rotate-message h2 { font-size: 28px; color: #f1c40f; margin-bottom: 10px; }
        .rotate-message p { font-size: 18px; text-align: center; padding: 0 20px; }

        /* GAME TABLE */
        #game-table {
            display: block;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        /* HEADER */
        .game-header {
            position: absolute;
            top: 5px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
            z-index: 100;
            pointer-events: none;
        }

        .points-box, .round-box {
            background: rgba(0, 0, 0, 0.8);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid;
            backdrop-filter: blur(3px);
        }

        .points-box { border-color: #f1c40f; color: #f1c40f; }
        .round-box { border-color: #2ecc71; color: #2ecc71; }

        /* MAIN LAYOUT */
        .landscape-container {
            display: flex;
            width: 100%;
            height: 100%;
            padding: 50px 5px 90px 5px;
            gap: 8px;
        }

        /* PLAYERS COLUMN (LEFT) */
        .players-column {
            flex: 0 0 140px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 5px 0;
            overflow-y: auto;
        }

        .player-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(3px);
            border-radius: 10px;
            padding: 8px 10px;
            border-left: 4px solid #f1c40f;
            position: relative;
        }

        .player-card.you {
            border-left: 4px solid #2ecc71;
            background: rgba(46, 204, 113, 0.15);
        }

        .player-name {
            font-size: 14px;
            font-weight: bold;
            color: #f1c40f;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-card.you .player-name { color: #2ecc71; }

        .player-stats {
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            color: white;
        }

        .player-turn-indicator {
            position: absolute;
            top: -8px;
            right: 8px;
            background: #2ecc71;
            color: black;
            font-size: 9px;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 12px;
            animation: turnPulse 1.2s infinite;
        }

        .player-waiting-indicator {
            position: absolute;
            top: -8px;
            right: 8px;
            background: #f1c40f;
            color: black;
            font-size: 9px;
            padding: 3px 10px;
            border-radius: 12px;
        }

        @keyframes turnPulse {
            0% { transform: scale(1); background: #2ecc71; }
            50% { transform: scale(1.05); background: #27ae60; }
            100% { transform: scale(1); background: #2ecc71; }
        }

        /* CENTER COLUMN */
        .center-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 5px 0;
        }

        .table-area {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(3px);
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid rgba(241, 196, 15, 0.2);
        }

        .deck-wrapper, #jackpot, #discard-pile {
            width: 65px;
            height: 95px;
        }

        .card-stack {
            width: 65px;
            height: 95px;
            background: linear-gradient(135deg, #2c3e50, #1a2632);
            border: 2px solid #95a5a6;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 5px 10px rgba(0,0,0,0.5);
        }

        #jackpot {
            background: linear-gradient(135deg, #f1c40f, #e67e22);
            border: 2px solid white;
            box-shadow: 0 0 15px gold;
            color: black;
            display: flex;
            flex-direction: column;
            font-size: 12px;
        }

        #discard-pile {
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,255,255,0.3);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* MINI CARDS IN DISCARD */
        .discard-cards {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .card-mini {
            position: absolute;
            width: 90%;
            height: 90%;
            background: white;
            border-radius: 4px;
            border: 1px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .card-mini:nth-child(1) { transform: rotate(-4deg) translate(-2px, -2px); }
        .card-mini:nth-child(2) { transform: rotate(3deg) translate(3px, 1px); opacity: 0.8; }
        .card-mini:nth-child(3) { transform: rotate(-2deg) translate(1px, 3px); opacity: 0.6; }
        .card-mini.red { color: #e74c3c; }

        /* CLICKABLE SCORE TABLE (MODAL TRIGGER) */
        .score-preview {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(3px);
            border-radius: 12px;
            padding: 8px 15px;
            border: 1px solid #f1c40f;
            width: 90%;
            max-width: 280px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 5px;
            text-align: center;
        }

        .score-preview:active { transform: scale(0.98); opacity: 0.9; }

        .score-preview h3 {
            color: #f1c40f;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .score-preview table {
            width: 100%;
            font-size: 12px;
            color: white;
            border-collapse: collapse;
        }

        .score-preview th {
            color: #f1c40f;
            padding: 5px;
            border-bottom: 1px solid #f1c40f;
        }

        .score-preview td { padding: 4px; }

        /* CHAT COLUMN (RIGHT) */
        .chat-column {
            flex: 0 0 160px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 12px;
            padding: 8px;
            border: 1px solid #f1c40f;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            color: #f1c40f;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            padding-bottom: 5px;
            border-bottom: 1px solid #f1c40f;
            margin-bottom: 5px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-right: 3px;
            margin-bottom: 5px;
        }

        .chat-message {
            padding: 4px 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            word-break: break-word;
            border-left: 2px solid #f1c40f;
        }

        .chat-username { color: #f1c40f; font-weight: bold; font-size: 10px; }
        .chat-text { font-size: 10px; }

        .chat-input-area {
            display: flex;
            gap: 3px;
        }

        .chat-input {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid #f1c40f;
            border-radius: 15px;
            padding: 5px 10px;
            color: white;
            font-size: 10px;
            outline: none;
        }

        .chat-send {
            background: #f1c40f;
            border: none;
            border-radius: 15px;
            padding: 5px 10px;
            color: black;
            font-weight: bold;
            font-size: 10px;
            cursor: pointer;
        }

        /* ACTION AREA (BOTTOM) */
        .action-area {
            position: fixed;
            bottom: 95px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            z-index: 200;
            pointer-events: none;
        }

        #asistenti-container {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            padding: 6px 15px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #f1c40f;
            pointer-events: auto;
        }

        .led-red, .led-green, .led-yellow, .led-orange {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .led-red { background: #ff4d4d; }
        .led-green { background: #2ecc71; animation: pulse 1.2s infinite; }
        .led-yellow { background: #f1c40f; }
        .led-orange { background: #ffa500; }

        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; transform: scale(1.1); }
        }

        #status-teksti { font-size: 12px; color: white; }

        #btn-mbyll {
            background: #27ae60;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #f1c40f;
            pointer-events: auto;
            display: none;
        }

        /* PLAYER HAND */
        .hand-section {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            border-top: 2px solid #f1c40f;
            height: 95px;
            padding: 5px 0;
            z-index: 150;
        }

        #player-hand {
            display: flex;
            justify-content: center;
            gap: 2px;
            overflow-x: auto;
            padding: 0 10px;
            height: 100%;
            align-items: center;
        }

        #player-hand .card {
            flex: 0 0 auto;
            width: 60px;
            height: 85px;
            background: white;
            border-radius: 8px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            margin-right: -12px;
            box-shadow: -3px 0 8px rgba(0,0,0,0.5);
            color: black;
            cursor: pointer;
            transition: transform 0.1s;
        }

        #player-hand .card:active {
            transform: translateY(-15px) scale(1.1);
            z-index: 10;
        }

        #player-hand .card.joker {
            background: linear-gradient(135deg, #2c3e50, #000);
            color: #f1c40f;
            border: 2px solid #f1c40f;
        }

        /* MODAL FOR SCORE TABLE */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .modal-content {
            background: #0a2a0a;
            border: 3px solid #f1c40f;
            border-radius: 20px;
            padding: 20px;
            max-width: 90%;
            max-height: 80%;
            overflow-y: auto;
            color: white;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .close-button {
            font-size: 30px;
            cursor: pointer;
            color: #f1c40f;
        }

        .modal-content table {
            width: 100%;
            border-collapse: collapse;
        }

        .modal-content th {
            color: #f1c40f;
            padding: 10px;
            border-bottom: 2px solid #f1c40f;
        }

        .modal-content td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid #444;
        }
    </style>
</head>
<body>
    <!-- ROTATE MESSAGE -->
    <div class="rotate-message">
        <div class="icon">🔄</div>
        <h2>Rrotullo telefonin</h2>
        <p>Kjo lojë funksionon vetëm në pozicion horizontal</p>
    </div>

    <!-- GAME TABLE -->
    <div id="game-table">
        <!-- HEADER -->
        <div class="game-header">
            <div class="points-box">PIKET: <span id="piket-vlera-header">0</span></div>
            <div class="round-box">RAUNDI <span id="current-round">1</span></div>
        </div>

        <!-- MAIN LAYOUT -->
        <div class="landscape-container">
            <!-- LEFT: PLAYERS -->
            <div class="players-column" id="players-column">
                <!-- Dinamikisht nga socket -->
            </div>

            <!-- CENTER: TABLE -->
            <div class="center-column">
                <div class="table-area">
                    <!-- DECK -->
                    <div class="deck-wrapper">
                        <div class="card-stack" id="deck-zion">DECK</div>
                    </div>
                    
                    <!-- JACKPOT (gjithmonë i dukshëm) -->
                    <div id="jackpot" class="card-stack">
                        <span>JACK</span>
                        <span>POT</span>
                    </div>
                    
                    <!-- DISCARD -->
                    <div id="discard-pile">
                        <div id="discard-cards-container" class="discard-cards"></div>
                    </div>
                </div>

                <!-- CLICKABLE SCORE PREVIEW (hap modal-in) -->
                <div class="score-preview" id="results-table-clickable">
                    <h3>PIKET AKTUALE</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Lojtari</th>
                                <th>Piket</th>
                            </tr>
                        </thead>
                        <tbody id="landscape-score-body">
                            <!-- Dinamikisht -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- RIGHT: CHAT -->
            <div class="chat-column">
                <div class="chat-header">CHAT</div>
                <div class="chat-messages" id="chat-messages"></div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chat-input" placeholder="Shkruaj...">
                    <button class="chat-send" id="chat-send">→</button>
                </div>
            </div>
        </div>

        <!-- ACTION AREA -->
        <div class="action-area">
            <div id="asistenti-container">
                <div id="status-drita" class="led-red"></div>
                <span id="status-teksti">Duke pritur...</span>
            </div>
            <button id="btn-mbyll">MBYLL</button>
        </div>

        <!-- PLAYER HAND -->
        <div class="hand-section">
            <div id="player-hand" class="hand-area"></div>
        </div>
    </div>

    <!-- MODAL FOR FULL SCORE TABLE -->
    <div id="score-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>TABELA E PLOTË</h2>
                <span class="close-button" onclick="toggleScoreboard()">&times;</span>
            </div>
            <table id="modal-score-table">
                <thead>
                    <tr>
                        <th>Lojtari</th>
                        <th>R1</th>
                        <th>R2</th>
                        <th>R3</th>
                        <th>R4</th>
                        <th>R5</th>
                        <th>R6</th>
                        <th>R7</th>
                        <th>R8</th>
                        <th>R9</th>
                        <th>R10</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="modal-score-body"></tbody>
            </table>
            <button onclick="toggleScoreboard()" style="margin-top:15px; padding:8px 20px; background:#f1c40f; border:none; border-radius:5px; cursor:pointer;">MBYLL</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
